---
- ansible.builtin.debug:
    msg: START connection={{ ansible_connection }}/basic.yaml

- name: Setup
  cisco.nxos.nxos_config:
    lines:
      - no system login-banner
      - no system motd
    match: none

- block:
    - name: Configure login banner and motd
      register: result
      cisco.nxos.nxos_system:
        login_banner: "this is login banner"
        motd: "this is motd"

    - name: Assert that the commands were generated and sent as expected
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'system login-banner \"this is login banner\"' in result.commands"
          - "'system motd \"this is motd\"' in result.commands"
      when: ansible_connection != 'ansible.netcommon.httpapi'

    - name: Idempotence check
      register: result
      cisco.nxos.nxos_system:
        login_banner: "this is login banner"
        motd: "this is motd"

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0
      when: ansible_connection != 'ansible.netcommon.httpapi'

    - name: Remove login banner and motd
      register: result
      cisco.nxos.nxos_system:
        login_banner:
        motd:

    - name: Assert that the commands were generated and sent as expected
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'no system login-banner' in result.commands"
          - "'no system motd' in result.commands"
      when: ansible_connection != 'ansible.netcommon.httpapi'

    - name: Idempotence check
      register: result
      cisco.nxos.nxos_system:
        login_banner:
        motd:

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0
      when: ansible_connection != 'ansible.netcommon.httpapi'

- ansible.builtin.debug:
    msg: END connection={{ ansible_connection }}/basic.yaml
