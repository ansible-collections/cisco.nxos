---
- ansible.builtin.debug:
    msg: "Start nxos_static_routes deleted integration tests connection = {{ ansible_connection }}"

- ansible.builtin.include_tasks: _populate_config.yaml

- block:
    - name: Gather static_routes facts
      cisco.nxos.nxos_facts: &facts
        gather_subset:
          - "!all"
          - "!min"
        gather_network_resources: static_routes

    - name: Delete all routes based on VRF
      cisco.nxos.nxos_static_routes:
        config:
          - vrf: trial_vrf
        state: deleted
      register: result

    - ansible.builtin.assert:
        that:
          - "result.changed == true"
          - "'vrf context trial_vrf' in result.commands"
          - "'no ip route 192.0.2.64/28 192.0.2.22 tag 4' in result.commands"
          - "'no ip route 192.0.2.64/28 192.0.2.23 name merged_route 1' in result.commands"
          - "result.commands | length == 3"

    - ansible.builtin.include_tasks: _populate_config.yaml

    - name: Delete routes based on AFI in a VRF
      cisco.nxos.nxos_static_routes:
        config:
          - vrf: trial_vrf
            address_families:
              - afi: ipv4
        state: deleted
      register: result

    - ansible.builtin.assert:
        that:
          - "result.changed == true"
          - "'vrf context trial_vrf' in result.commands"
          - "'no ip route 192.0.2.64/28 192.0.2.22 tag 4' in result.commands"
          - "'no ip route 192.0.2.64/28 192.0.2.23 name merged_route 1' in result.commands"
          - "result.commands | length == 3"
    
    - name: Setup overlapping routes for targeted VRF vs Global delete test
      cisco.nxos.nxos_config:
        lines:
          - ip route 192.0.2.200/32 192.0.2.222
          - vrf context trial_vrf
          - ip route 192.0.2.200/32 192.0.2.222

    - name: Delete ONLY the non-VRF (global) route
      cisco.nxos.nxos_static_routes:
        config:
          - address_families:
              - afi: ipv4
                routes:
                  - dest: 192.0.2.200/32
                    next_hops:
                      - forward_router_address: 192.0.2.222
        state: deleted
      register: result

    - ansible.builtin.assert:
        that:
          - "result.changed == true"
          - "'no ip route 192.0.2.200/32 192.0.2.222' in result.commands"
          - "'vrf trial_vrf' not in (result.commands | join(' '))" 

    - name: Delete ONLY the VRF route
      cisco.nxos.nxos_static_routes:
        config:
          - vrf: trial_vrf
            address_families:
              - afi: ipv4
                routes:
                  - dest: 192.0.2.200/32
                    next_hops:
                      - forward_router_address: 192.0.2.222
        state: deleted
      register: result

    - ansible.builtin.assert:
        that:
          - "result.changed == true"
          - "'vrf context trial_vrf' in result.commands"
          - "'no ip route 192.0.2.200/32 192.0.2.222' in result.commands"

  always:
    - ansible.builtin.include_tasks: _remove_config.yaml
