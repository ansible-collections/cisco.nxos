---
- ansible.builtin.debug:
    msg: Start nxos_hsrp_interfaces merged integration tests connection={{ ansible_connection }}

- name: Set a fact for 'test_int1' and 'test_int2'
  ansible.builtin.set_fact:
    test_int1: "{{ nxos_int1 }}"
    test_int2: "{{ nxos_int2 }}"

- name: Set a fact for 'bfd_disable' and 'bfd_enable'
  ansible.builtin.set_fact:
    bfd_enable: enable
    bfd_disable: disable
  when: platform is not search('N35')

- block:
    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Setup2
      cisco.nxos.nxos_config:
        lines:
          - "feature bfd"
          - "feature hsrp"
          - "interface {{ test_int1 }}"
          - "  no switchport"
          - "  hsrp bfd"

    - name: Setup3
      cisco.nxos.nxos_config:
        lines:
          - "interface {{ test_int2 }}"
          - "  no switchport"

    - name: Merged
      register: result
      cisco.nxos.nxos_hsrp_interfaces: &id001
        config:
          - name: "{{ test_int1 }}"
            standby:
              bfd: true
              mac_refresh: 400
              version: 2
            standby_options:
              - group_name: VLAN10-GROUP
                group_no: 10
                ip:
                  - secondary: true
                    virtual_ip: 10.10.10.2
                mac_address: 00CC.10DD.10EE
        state: merged

    - ansible.builtin.assert:
        that:
          - result.changed == true
          - "{{ merged['commands'] | symmetric_difference(result['commands']) | length == 0 }}"

    - name: Gather hsrp_interfaces facts
      cisco.nxos.nxos_facts:
        gather_subset:
          - "!all"
          - "!min"
        gather_network_resources: hsrp_interfaces

    - name: Idempotence - merged
      register: result
      cisco.nxos.nxos_hsrp_interfaces: *id001

    - ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - name: Merged - add preempt
      register: result
      cisco.nxos.nxos_hsrp_interfaces: &add_preempt
        config:
          - name: "{{ test_int1 }}"
            standby:
              version: 2
            standby_options:
              - group_no: 10
                preempt:
                  minimum: 10
                  reload: 50
                  sync: 5
        state: merged

    - ansible.builtin.assert:
        that:
          - result.changed == true
          - "'preempt delay minimum 10 reload 50 sync 5' in result.commands"

    - name: Idempotence - add preempt
      register: result
      cisco.nxos.nxos_hsrp_interfaces: *add_preempt

    - ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands | length == 0

    - name: Merged - change preempt reload sub-key only
      register: result
      cisco.nxos.nxos_hsrp_interfaces:
        config:
          - name: "{{ test_int1 }}"
            standby:
              version: 2
            standby_options:
              - group_no: 10
                preempt:
                  minimum: 10
                  reload: 200
                  sync: 5
        state: merged

    - ansible.builtin.assert:
        that:
          - result.changed == true
          - "'preempt delay minimum 10 reload 200 sync 5' in result.commands"
  when: bfd_enable is defined

  always:
    - ansible.builtin.include_tasks: _remove_config.yaml
