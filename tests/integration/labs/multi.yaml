lab:
  description: "Upstream test lab for cisco.nxos"
  notes: "Upstream test lab for cisco.nxos"
  title: cisco.nxos.nxos
  version: 0.2.2
nodes:
  # The Nexus Switch device
  - boot_disk_size: null
    configuration: &conf |2-
      !Command: show running-config
      !Running configuration last done at: Mon Feb 12 07:11:33 2024
      !Time: Mon Feb 12 07:11:33 2024

      version 10.3(1) Bios:version
      hostname R1
      vdc R1 id 1
        limit-resource vlan minimum 16 maximum 4094
        limit-resource vrf minimum 2 maximum 4096
        limit-resource port-channel minimum 0 maximum 511
        limit-resource m4route-mem minimum 58 maximum 58
        limit-resource m6route-mem minimum 8 maximum 8

      ! Re-enable the NX-API feature for the httpapi tests
      feature nxapi

      no password strength-check
      username admin password 5 $5$AADOBF$GVXUV2cvmlZH42xDu6wnqfBpV9gXF61WGVNrGF5Gk6C  role network-admin
      username ansible password 5 $5$GHBNKA$8ccD8KWjmP6NzxzkIRufl7giaUWjrhAn4SRrVWYZ4R1  role network-admin
      username ansible passphrase  lifetime 99999 warntime 14 gracetime 3
      ssh key rsa 2048
      ip domain-lookup

      vlan 1

      vrf context management
        ip name-server 192.168.255.1
        ip route 0.0.0.0/0 192.168.255.1
      
      ! Configure the NX-API port
      nxapi http port 80

      interface mgmt0
        ip address dhcp
        vrf member management

      line console
        exec-timeout 0
      line vty
        exec-timeout 0
      boot nxos bootflash:/nxos64-cs.10.3.1.F.bin
      no logging console
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n0
    image_definition: null
    label: stable-2.16
    node_definition: nxosv9000
    parameters: {}
    ram: null
    tags: []
    x: 240
    y: 120
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: mgmt0
        slot: 0
        type: physical
      - id: i2
        label: Ethernet1/1
        slot: 1
        type: physical
  
  # The External Connector (bridged)
  - boot_disk_size: null
    configuration: virbr0
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n1
    image_definition: null
    label: ci-god
    node_definition: external_connector
    parameters: {}
    ram: null
    tags: []
    x: -80
    y: -160
    interfaces:
      - id: i0
        label: port
        slot: 0
        type: physical
links:
  # Direct link from the switch's management port to the external connector
  - id: l0
    n1: n0
    n2: n1
    i1: i1
    i2: i0
    conditioning: {}
    label: stable-2.16-mgmt0<->ci-god-port

